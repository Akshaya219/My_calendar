<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="StudySync — Your all-in-one study & placement prep companion for B.Tech AI & DS" />
    <meta name="theme-color" content="#10b981" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>StudySync — Study & Placement Prep</title>
    <script>
      // ── ATOMIC CACHE BUSTER ───────────────────────────────────────────────
      // If the URL doesn't have the current version, force a redirect.
      // This is the ONLY way to bypass the root index.html cache in Chrome.
      const VERSION = '1.0.4';
      const url = new URL(window.location.href);
      if (url.searchParams.get('v') !== VERSION) {
        url.searchParams.set('v', VERSION);
        window.location.replace(url.toString());
      }

      // ── THE NUCLEAR OPTION: SERVICE WORKER BUSTER ──────────────────────────
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
